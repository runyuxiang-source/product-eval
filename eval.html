<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焦点小组评估</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft YaHei','PingFang SC',sans-serif;}
body{background:#F0F4F8;color:#1A202C;padding:16px;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:10px;padding:24px;border:1px solid #E2E8F0;width:100%;max-width:640px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
h1{font-size:20px;color:#2B6CB0;margin-bottom:4px;}
.sub{font-size:13px;color:#4A5568;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #E2E8F0;}
.info{background:#EBF4FF;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#2B6CB0;line-height:1.6;}
.q{font-size:14px;font-weight:600;color:#1A202C;margin:14px 0 4px;}
.q-num{display:inline-flex;background:#2B6CB0;color:#fff;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;margin-right:6px;flex-shrink:0;}
.q-wrap{display:flex;align-items:flex-start;gap:6px;}
textarea{width:100%;padding:8px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px;resize:vertical;min-height:60px;font-family:inherit;}
textarea:focus{outline:none;border-color:#2B6CB0;box-shadow:0 0 0 2px rgba(43,108,176,0.1);}
label{font-size:12px;color:#4A5568;margin:10px 0 2px;font-weight:600;display:block;}
input,select{width:100%;padding:7px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:13px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:480px){.g2{grid-template-columns:1fr;}}
.btn{padding:10px 28px;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin:12px 0 4px;width:100%;}
.btn-b{background:#2B6CB0;color:#fff;}
.btn-s{background:#EDF2F7;color:#4A5568;}
.thanks{text-align:center;padding:48px 20px;}
.thanks h2{font-size:24px;color:#38A169;margin-bottom:8px;}
.thanks p{color:#4A5568;line-height:1.6;}
.hide{display:none;}
.err{color:#E53E3E;font-size:12px;}
.foot{text-align:center;font-size:11px;color:#A0AEC0;margin-top:16px;}
</style>
</head>
<body>

<div class="card" id="loading"><p style="text-align:center;color:#A0AEC0;">⏳ 加载中…</p></div>

<div id="survey" class="card hide">
<div id="productInfo"></div>
<label>你的姓名</label>
<input id="userName" placeholder="如：张经理">
<label>你的部门</label>
<select id="userDept">
<option value="">请选择</option>
<option value="产品部">产品部</option>
<option value="生产部">生产部</option>
<option value="财务中心">财务中心</option>
<option value="市场部-大区">市场部-大区</option>
<option value="会务部">会务部</option>
<option value="品牌中心">品牌中心</option>
<option value="教育部">教育部</option>
<option value="行政人力部">行政人力部</option>
<option value="总裁办">总裁办</option>
<option value="其他">其他</option>
</select>
<div class="q-wrap"><span class="q-num">1</span><div><div class="q">你觉得这个产品怎么样？第一反应是什么？</div>
<textarea id="q1" rows="3" placeholder="说说你的第一印象"></textarea></div></div>
<div class="q-wrap"><span class="q-num">2</span><div><div class="q">你有什么不放心的？</div>
<textarea id="q2" rows="3" placeholder="技术、市场、价格、渠道……随便说"></textarea></div></div>
<div class="q-wrap"><span class="q-num">3</span><div><div class="q">如果要你配合推这个产品，你需要什么支持？</div>
<textarea id="q3" rows="3" placeholder="需要什么资源/帮助"></textarea></div></div>
<div id="submitMsg" class="err"></div>
<button class="btn btn-b" onclick="submitEval()">📤 提交</button>
</div>

<div id="thanks" class="card hide">
<div class="thanks">
<h2>✅ 提交成功</h2>
<p>你的意见已提交给评估发起人。<br>后续结论会通过群消息同步。</p>
<div class="foot">焦点小组评估 · 参与就是尊严，听取就是奖赏</div>
</div>
</div>

<script>
if(typeof __gsAPI === 'undefined'){
 var __gsURL = typeof SUPABASE_URL !== 'undefined' ? SUPABASE_URL : '';
 var __gsKey = typeof SUPABASE_KEY !== 'undefined' ? SUPABASE_KEY : '';
 var __gsAPI = supabase.createClient(__gsURL, __gsKey);
 var __gsEID = new URLSearchParams(window.location.search).get('id');

 if(!__gsEID){
  document.getElementById('loading').innerHTML = '<p style="color:#E53E3E;text-align:center;">❌ 无效链接，缺少评估ID</p>';
 } else {
  __gsAPI.from('evaluations').select('*').eq('id',__gsEID).single().then(function(res){
   if(res.error||!res.data){
    document.getElementById('loading').innerHTML = '<p style="color:#E53E3E;text-align:center;">❌ 未找到该评估</p>';
    return;
   }
   var e = res.data;
   document.getElementById('loading').classList.add('hide');
   document.getElementById('survey').classList.remove('hide');
   document.getElementById('productInfo').innerHTML =
    '<h1>'+e.name+'</h1>' +
    '<div class="sub">'+(e.desc_text||'')+(e.price?' · '+e.price:'')+(e.launch_date?' · '+e.launch_date:'')+'</div>' +
    '<div class="info">📌 正在评估「'+e.name+'」，想听听你的真实想法。<br>三个问题，3分钟填完。没有对错，放心说。</div>';
  });
 }

 function submitEval(){
  var name = document.getElementById('userName').value.trim();
  var dept = document.getElementById('userDept').value;
  var q1 = document.getElementById('q1').value.trim();
  var q2 = document.getElementById('q2').value.trim();
  var q3 = document.getElementById('q3').value.trim();
  if(!name){ document.getElementById('submitMsg').textContent = '请填名字'; return; }
  if(!dept){ document.getElementById('submitMsg').textContent = '请选部门'; return; }
  if(!q1){ document.getElementById('submitMsg').textContent = '请回答问题一'; return; }
  document.getElementById('submitMsg').textContent = '';
  // 查是否已提交过
  __gsAPI.from('participants').select('id').eq('eval_id',__gsEID).eq('name',name).then(function(ex){
   if(ex.data&&ex.data.length>0){
    __gsAPI.from('participants').update({q1:q1,q2:q2,q3:q3,filled:true,department:dept}).eq('eval_id',__gsEID).eq('name',name).then(function(res){
     if(res.error){ document.getElementById('submitMsg').textContent = '提交失败'; return; }
     done();
    });
   } else {
    __gsAPI.from('participants').insert({eval_id:__gsEID,name:name,department:dept,q1:q1,q2:q2,q3:q3,filled:true}).then(function(res){
     if(res.error){ document.getElementById('submitMsg').textContent = '提交失败'; return; }
     done();
    });
   }
  });
  function done(){ document.getElementById('survey').classList.add('hide'); document.getElementById('thanks').classList.remove('hide'); }
 }
}
</script>
</body>
</html>
